<!doctype html>

<html lang="en">

<head>

  <title>Error</title>

  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      background-color: #08141a;
      color: white;
      font-family: 'Titillium Web', sans-serif;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      font-size: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
    }

    .risk-header {
      color: #d9b10c;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      opacity: 25%;
    }

    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      opacity: 75%;
    }

    .error-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 8rem;
      background-color: #08141a;
      border-radius: 0.25rem;
      padding: 1rem;
    }

    a {
      text-decoration: none;
      color: white;
      background-color: #0085b6;
      border-radius: 0.25rem;
      padding: 0.25rem;
      text-shadow: none;
    }

    a:hover {
      background-color: white;
      color: black;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
      }
    }
  </style>

</head>

<body>
  <video autoplay muted loop playsinline class="bg-video">
    <source src="/images/fail_stage1.mp4" type="video/mp4">
  </video>
  <img src="/images/menu.png" class="bg-image">
  <div class="header">
    <div>
      ERROR: Website Failed
    </div>
    <div class="risk-header">
      RISK:
      <img src="/images/heist-dif-6.png" />
    </div>
  </div>
  <div class="error-message">
    <p>
      There was an error processing your request
    </p>
    <p>
      Please submit a bug report if this keeps happening.
    </p>
    <a href="https://github.com/0lafe/payday2Charts/issues" target="_blank">
      Report Bugs Here
    </a>
  </div>
</body>

</html>
